#!/bin/bash

##################################################
# rhcsa-minilab variables.conf
#
# Environment-specific settings only.
#
# Most users should only ever need to edit this file.
##################################################

##################################################
# RHEL Version
##################################################

RHEL_VERSION=10

##################################################
# Hostnames
##################################################

SERVER_HOSTNAME=server
CLIENT_HOSTNAME=client
DOMAIN=rhcsa.local

##################################################
# Network Settings
##################################################

SERVER_IP=192.168.13.52
CLIENT_IP=192.168.13.53

PREFIX=24
GATEWAY=192.168.13.1
DNS=192.168.13.1

##################################################
# Network Interfaces
##################################################

SERVER_IFACE=ens18
CLIENT_IFACE=ens18

##################################################
# Storage
##################################################

CLIENT_EXTRA_DISK=/dev/sdb

##################################################
# Installation Media
##################################################

ISO_DEVICE=/dev/sr0

##################################################
# NFS
##################################################

NFS_EXPORT=/share

##################################################
# HTTP Repository
##################################################

REPO_ROOT=/var/www/html

##################################################
# SELinux
##################################################

SELINUX_MODE=enforcing

##################################################
# Timezone
##################################################

DEFAULT_TIMEZONE=America/Los_Angeles

##################################################
# Derived Variables
##################################################

SERVER_HTTP_REPO=http://${SERVER_IP}

SERVER_NFS_EXPORT=${SERVER_IP}:${NFS_EXPORT}

